<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icône "A" stylisé avec barres de performance -->
  <g transform="translate(30, 20)">
    <!-- Triangle / A stylisé -->
    <polygon points="45,10 10,120 30,120 45,75 60,120 80,120" fill="url(#grad1)" />
    <!-- Barre horizontale du A -->
    <rect x="25" y="85" width="40" height="10" rx="2" fill="url(#grad2)" />

    <!-- Barres de performance (graphique) -->
    <rect x="90" y="70" width="12" height="50" rx="3" fill="#42a5f5" opacity="0.6" />
    <rect x="108" y="50" width="12" height="70" rx="3" fill="#1a73e8" opacity="0.75" />
    <rect x="126" y="30" width="12" height="90" rx="3" fill="url(#grad1)" />
  </g>

  <!-- Texte "allperf" -->
  <text x="195" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="700" fill="#1a237e" letter-spacing="-1">
    allperf
  </text>

  <!-- Sous-titre -->
  <text x="195" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#5c6bc0" letter-spacing="4" font-weight="400">
    BUSINESS INTELLIGENCE
  </text>

  <!-- Ligne décorative -->
  <rect x="195" y="140" width="280" height="3" rx="1.5" fill="url(#grad2)" opacity="0.5" />
</svg>

